name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Scripts
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate PowerShell Scripts
      shell: pwsh
      run: |
        $scripts = Get-ChildItem -Path "src/playbook/Executables" -Filter "*.ps1" -Recurse
        foreach ($script in $scripts) {
            Write-Host "Validating: $($script.Name)"
            $errors = $null
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $script.FullName -Raw), [ref]$errors)
            if ($errors) {
                Write-Host "Errors found in $($script.Name):" -ForegroundColor Red
                $errors | ForEach-Object { Write-Host $_.Message -ForegroundColor Red }
                exit 1
            }
            Write-Host "✓ $($script.Name) is valid" -ForegroundColor Green
        }

    - name: Validate Registry Files
      shell: pwsh
      run: |
        $regFiles = Get-ChildItem -Path "src/playbook/Configuration" -Filter "*.reg" -Recurse
        foreach ($reg in $regFiles) {
            Write-Host "Validating: $($reg.Name)"
            $content = Get-Content $reg.FullName -Raw
            if ($content -notmatch "^Windows Registry Editor Version") {
                Write-Host "Invalid registry format: $($reg.Name)" -ForegroundColor Red
                exit 1
            }
            Write-Host "✓ $($reg.Name) is valid" -ForegroundColor Green
        }

  build:
    name: Build Playbook
    runs-on: windows-latest
    needs: validate
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup PowerShell
      shell: pwsh
      run: |
        Write-Host "PowerShell Version:" -ForegroundColor Cyan
        $PSVersionTable.PSVersion

    - name: Build Playbook
      shell: cmd
      run: |
        cd src\playbook
        call build-playbook.cmd

    - name: Upload Playbook
      uses: actions/upload-artifact@v4
      with:
        name: playbook
        path: |
          src/playbook/*.playbook
          src/playbook/*.conf
        retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Playbook
      uses: actions/download-artifact@v4
      with:
        name: playbook

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          src/playbook/*.playbook
          src/playbook/*.conf
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check Markdown Links
      run: |
        # Check for broken links in markdown files
        echo "Checking documentation..."

    - name: Verify File Structure
      run: |
        echo "Verifying project structure..."
        test -f README.md || exit 1
        test -f PROJECT.md || exit 1
        test -f LICENSE || exit 1
        test -d docs/ || exit 1
        test -d src/playbook/Executables/ || exit 1
        echo "✓ All required files present"